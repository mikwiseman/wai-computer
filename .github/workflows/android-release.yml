name: android-release

# Build a signed AAB on release tags. Does NOT auto-publish to Play
# Console — Mik uploads the artifact manually so the human stays in the
# loop on what reaches the Production track.
#
# Trigger:
#   git tag android-v1.0.0
#   git push origin android-v1.0.0

on:
  push:
    tags:
      - "android-v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build"
        required: false
        default: "main"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret missing — refusing to build a release without signing."
            exit 1
          fi
          mkdir -p android/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/keystore/upload.jks

      - name: Materialize keystore.properties
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=keystore/upload.jks
          storePassword=$ANDROID_STORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Materialize gradle.properties Sentry DSN
        env:
          ANDROID_SENTRY_DSN: ${{ secrets.ANDROID_SENTRY_DSN }}
        run: |
          if [ -n "$ANDROID_SENTRY_DSN" ]; then
            echo "wai.sentryDsn=$ANDROID_SENTRY_DSN" >> android/gradle.properties
          fi

      - name: Run unit tests + lint
        working-directory: android
        run: ./gradlew --no-daemon testDebugUnitTest lint

      - name: Build signed AAB
        working-directory: android
        run: ./gradlew --no-daemon :app:bundleRelease

      - name: Build signed APK (for sideload / QA)
        working-directory: android
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Upload mapping.txt for symbolication
        uses: actions/upload-artifact@v4
        with:
          name: app-release-mapping
          path: android/app/build/outputs/mapping/release/mapping.txt
          retention-days: 90

      # NOTE: we intentionally do NOT publish to Play Console here.
      # Pick up the AAB from the artifact list and upload manually,
      # or wire up a dedicated `publish-play` workflow that requires
      # manual approval.
