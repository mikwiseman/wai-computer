name: macOS Release

# Build, sign, notarize, and publish a stable or beta macOS DMG. Triggered
# manually (workflow_dispatch) so we don't accidentally ship every commit.
# Runs on the self-hosted Mac runner so Developer ID, Sparkle EdDSA, and
# notarization credentials stay in its keychain — never uploaded as GitHub
# Secrets.
#
# Pre-flight: bump `CURRENT_PROJECT_VERSION` in
# `macos/WaiComputer/project.yml` (monotonic — Sparkle requires it), run
# `xcodegen generate` in that directory, and commit before triggering.

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        type: choice
        options: [stable, beta]
        default: stable

# Only one release running at a time per channel — Apple notarytool serialises
# anyway, and parallel uploads would race on the appcast merge.
concurrency:
  group: macos-release-${{ inputs.channel }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: [self-hosted, macOS]
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pre-flight check
        run: |
          test -f macos/WaiComputer/project.yml
          test -x scripts/release-macos.sh
          test -f "$APPSTORECONNECT_CONFIG" \
            || (echo "Missing $APPSTORECONNECT_CONFIG on this runner" >&2; exit 1)
          security find-identity -p basic -v \
            | grep -q "Developer ID Application" \
            || (echo "No Developer ID Application identity on this runner" >&2; exit 1)

      - name: Release ${{ inputs.channel }}
        env:
          VPS_USER: root
        run: scripts/release-macos.sh "${{ inputs.channel }}"

      - name: Verify appcast
        run: |
          curl -fsS https://wai.computer/releases/macos/appcast.xml \
            | head -20
