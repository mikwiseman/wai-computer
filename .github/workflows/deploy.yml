name: Deploy

concurrency:
  # Same idea as macos-release: per-branch grouping so rapid pushes to main
  # don't compound. backend-test alone takes ~8-12 min with the postgres
  # service; we'd rather pay for the latest commit's run than every commit
  # in a 5-minute fix burst.
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "web/**"
      - "shared/**"
      - "ios/**"
      - "macos/**"
      - "android/**"
      - "scripts/**"
      - ".github/workflows/deploy.yml"
      - ".dockerignore"

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: waicomputer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/waicomputer_test
          TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/waicomputer_test
          JWT_SECRET: test-secret-for-ci
          REDIS_URL: redis://localhost:6379/0
        run: pytest -x -q

  web-test:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit

      - name: Install Playwright Chromium
        timeout-minutes: 20
        run: pnpm exec playwright install --with-deps --only-shell chromium

      - name: Browser E2E
        timeout-minutes: 12
        run: pnpm test:e2e --project=chromium

  android-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Android build
        run: ./gradlew --no-daemon testDebugUnitTest assembleDebug

  apple-native-test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: |
            artifacts/ci-swiftpm-sourcepackages
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-${{ runner.arch }}-xcode16-spm-${{ hashFiles('shared/WaiComputerKit/Package.resolved', 'ios/WaiComputer/WaiComputeriOS.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'macos/WaiComputer/WaiComputer.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xcode16-spm-

      - name: Shared Swift package tests
        working-directory: shared/WaiComputerKit
        run: |
          # Use Xcode 16.2 for SPM — avoids sentry-cocoa Swift 6.1 manifest bug
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          swift test -q --cache-path "$GITHUB_WORKSPACE/artifacts/ci-swiftpm-sourcepackages" --disable-automatic-resolution --skip-update

      - name: Select default Xcode for builds
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Build iOS app
        run: >
          xcodebuild
          -project ios/WaiComputer/WaiComputeriOS.xcodeproj
          -scheme WaiComputer
          -destination 'generic/platform=iOS Simulator'
          -clonedSourcePackagesDirPath "${GITHUB_WORKSPACE}/artifacts/ci-swiftpm-sourcepackages"
          -disableAutomaticPackageResolution
          -skipPackageUpdates
          CODE_SIGNING_ALLOWED=NO
          build

  deploy:
    needs: [backend-test, web-test, android-test, apple-native-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote application directory exists
        run: |
          set -euo pipefail
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "install -d -m 755 /opt/waicomputer"

      - name: Prepare bootstrap env file
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_CONVERSATION_AGENT_ID: ${{ secrets.ELEVENLABS_CONVERSATION_AGENT_ID }}
          ELEVENLABS_RECORDING_AGENT_ID: ${{ secrets.ELEVENLABS_RECORDING_AGENT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          AUTH_COOKIE_DOMAIN: ${{ secrets.AUTH_COOKIE_DOMAIN }}
        run: |
          set -euo pipefail
          for key in POSTGRES_PASSWORD JWT_SECRET FRONTEND_URL CORS_ORIGINS ELEVENLABS_API_KEY AUTH_COOKIE_DOMAIN; do
            if [[ -z "${!key:-}" ]]; then
              echo "ERROR: required GitHub secret ${key} is missing or empty" >&2
              exit 1
            fi
          done
          umask 077
          cat > /tmp/waicomputer-backend.env <<EOF
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=waicomputer
          DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/waicomputer
          JWT_SECRET=${JWT_SECRET}
          CORS_ORIGINS=${CORS_ORIGINS}
          SPEECH_TO_TEXT_PROVIDER=elevenlabs
          REALTIME_VOICE_PROVIDER=elevenlabs
          ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
          ELEVENLABS_CONVERSATION_AGENT_ID=${ELEVENLABS_CONVERSATION_AGENT_ID}
          ELEVENLABS_RECORDING_AGENT_ID=${ELEVENLABS_RECORDING_AGENT_ID}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          RESEND_API_KEY=${RESEND_API_KEY}
          EMAIL_FROM=${EMAIL_FROM}
          FRONTEND_URL=${FRONTEND_URL}
          REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
          CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
          CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}
          SENTRY_DSN=${SENTRY_DSN}
          AUTH_COOKIE_DOMAIN=${AUTH_COOKIE_DOMAIN}
          EOF
          sed -i 's/^[[:space:]]*//' /tmp/waicomputer-backend.env
          chmod 600 /tmp/waicomputer-backend.env

      - name: Sync repository to VPS
        run: |
          set -euo pipefail
          rsync \
            -az \
            --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'backend/.env' \
            --exclude 'backend/.venv/' \
            --exclude 'backend/htmlcov/' \
            --exclude 'backend/coverage.xml' \
            --exclude 'web/node_modules/' \
            --exclude 'web/.next/' \
            --exclude 'android/.gradle/' \
            --exclude 'backups/' \
            --exclude 'releases/' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/waicomputer/"

      - name: Copy bootstrap env file to VPS
        run: |
          set -euo pipefail
          scp /tmp/waicomputer-backend.env "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/waicomputer-backend.env"

      - name: Prepare remote deploy script
        run: |
          set -euo pipefail
          cat > /tmp/waicomputer-remote-deploy.sh <<'EOF'
          set -euo pipefail
          PROD_ROOT=/opt/waicomputer
          PROD_ENV_DIR=/etc/waicomputer
          PROD_ENV_FILE=/etc/waicomputer/backend.env
          LEGACY_ENV_FILE=

          wait_for_service() {
            local name="$1"
            local command="$2"
            local attempts="$3"
            local delay="$4"
            local failure_log_command="$5"
            local attempt
            for attempt in $(seq 1 "$attempts"); do
              if eval "$command" >/dev/null 2>&1; then
                return 0
              fi
              sleep "$delay"
            done
            echo "$name did not become healthy after $((attempts * delay)) seconds." >&2
            docker_compose ps >&2 || true
            eval "$failure_log_command" >&2 || true
            exit 1
          }

          require_env_key() {
            local key="$1"
            if ! grep -Eq "^${key}=.+" "$PROD_ENV_FILE"; then
              echo "ERROR: $PROD_ENV_FILE is missing required key $key" >&2
              exit 1
            fi
          }

          docker_compose() {
            docker compose --env-file "$PROD_ENV_FILE" "$@"
          }

          legacy_db_container="$(docker ps -aq --filter label=com.docker.compose.project=backend --filter label=com.docker.compose.service=db | head -n 1 || true)"
          if [[ -n "$legacy_db_container" ]]; then
            LEGACY_ENV_FILE="$(docker inspect -f '{{ index .Config.Labels "com.docker.compose.project.environment_file" }}' "$legacy_db_container" 2>/dev/null || true)"
          fi

          install -d -m 755 "$PROD_ROOT"
          install -d -m 755 "$PROD_ROOT/releases/macos"
          install -d -m 700 "$PROD_ENV_DIR"

          if [[ ! -f "$PROD_ENV_FILE" && -n "$LEGACY_ENV_FILE" && -f "$LEGACY_ENV_FILE" ]]; then
            install -m 600 -o root -g root "$LEGACY_ENV_FILE" "$PROD_ENV_FILE"
            sed -i 's|^FRONTEND_URL=.*|FRONTEND_URL=https://wai.computer|' "$PROD_ENV_FILE"
            sed -i 's|^AUTH_COOKIE_DOMAIN=.*|AUTH_COOKIE_DOMAIN=wai.computer|' "$PROD_ENV_FILE"
            sed -i 's|^CORS_ORIGINS=.*|CORS_ORIGINS=["https://wai.computer"]|' "$PROD_ENV_FILE"
            sed -i 's|^EMAIL_FROM=.*<|EMAIL_FROM=WaiComputer <|' "$PROD_ENV_FILE"
            grep -q '^FRONTEND_URL=' "$PROD_ENV_FILE" || printf '%s\n' 'FRONTEND_URL=https://wai.computer' >> "$PROD_ENV_FILE"
            grep -q '^AUTH_COOKIE_DOMAIN=' "$PROD_ENV_FILE" || printf '%s\n' 'AUTH_COOKIE_DOMAIN=wai.computer' >> "$PROD_ENV_FILE"
            grep -q '^CORS_ORIGINS=' "$PROD_ENV_FILE" || printf '%s\n' 'CORS_ORIGINS=["https://wai.computer"]' >> "$PROD_ENV_FILE"
          elif [[ ! -f "$PROD_ENV_FILE" ]]; then
            install -m 600 -o root -g root /tmp/waicomputer-backend.env "$PROD_ENV_FILE"
          fi
          rm -f /tmp/waicomputer-backend.env

          chmod 600 "$PROD_ENV_FILE"
          chown root:root "$PROD_ENV_FILE"
          ln -sfn "$PROD_ENV_FILE" "$PROD_ROOT/backend/.env"
          require_env_key POSTGRES_USER
          require_env_key POSTGRES_PASSWORD
          require_env_key POSTGRES_DB
          require_env_key JWT_SECRET
          require_env_key FRONTEND_URL
          require_env_key CORS_ORIGINS
          require_env_key ELEVENLABS_API_KEY
          require_env_key AUTH_COOKIE_DOMAIN

          cd "$PROD_ROOT/backend"
          export WAICOMPUTER_ENV_FILE="$PROD_ENV_FILE"
          docker_compose config >/dev/null
          docker_compose build api web celery-worker
          docker_compose up -d --remove-orphans api web celery-worker caddy
          wait_for_service \
            "API health check" \
            "docker_compose exec -T api curl -fsS http://localhost:8000/health" \
            24 \
            5 \
            "docker logs --tail 200 waicomputer-api"
          wait_for_service \
            "Web health check" \
            "docker_compose exec -T web node -e \"fetch('http://localhost:3000/').then(r => process.exit(r.status < 500 ? 0 : 1)).catch(() => process.exit(1))\"" \
            24 \
            5 \
            "docker logs --tail 200 waicomputer-web"
          wait_for_service \
            "Celery worker health check" \
            "[[ \"$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}' waicomputer-celery-worker 2>/dev/null)\" == healthy ]]" \
            24 \
            5 \
            "docker logs --tail 200 waicomputer-celery-worker"

          # Caddy bind-mounts Caddyfile by path. rsync replaces files by rename,
          # giving them a new inode; the running container keeps reading the old
          # inode until it is restarted. If host and container checksums differ,
          # restart caddy so the new config takes effect.
          host_caddy_sum=$(md5sum "$PROD_ROOT/backend/Caddyfile" | awk '{print $1}')
          container_caddy_sum=$(docker exec waicomputer-caddy md5sum /etc/caddy/Caddyfile 2>/dev/null | awk '{print $1}' || echo none)
          if [[ "$host_caddy_sum" != "$container_caddy_sum" ]]; then
            echo "Caddyfile changed on host ($host_caddy_sum vs $container_caddy_sum) — restarting caddy"
            docker_compose restart caddy
            wait_for_service \
              "Caddy post-restart" \
              "[[ \"$(docker inspect --format '{{.State.Running}}' waicomputer-caddy 2>/dev/null)\" == true ]]" \
              12 \
              2 \
              "docker logs --tail 200 waicomputer-caddy"
            wait_for_service \
              "Caddy HTTPS handshake" \
              "docker exec waicomputer-caddy wget -qO- --header='Host: wai.computer' --tries=1 --timeout=5 http://localhost/health" \
              18 \
              2 \
              "docker logs --tail 200 waicomputer-caddy"
          fi
          echo "Deploy successful (api + web + celery-worker)"
          EOF
          sed -i 's/^[[:space:]]*//' /tmp/waicomputer-remote-deploy.sh
          chmod 700 /tmp/waicomputer-remote-deploy.sh

      - name: Copy remote deploy script to VPS
        run: |
          set -euo pipefail
          scp /tmp/waicomputer-remote-deploy.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/waicomputer-remote-deploy.sh"

      - name: Deploy on VPS
        run: |
          set -euo pipefail
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "bash /tmp/waicomputer-remote-deploy.sh && rm -f /tmp/waicomputer-remote-deploy.sh"
