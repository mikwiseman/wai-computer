name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "web/**"
      - "shared/**"
      - "ios/**"
      - "macos/**"
      - "android/**"
      - "scripts/**"
      - ".github/workflows/deploy.yml"
      - ".dockerignore"

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: waicomputer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/waicomputer_test
          TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/waicomputer_test
          JWT_SECRET: test-secret-for-ci
          REDIS_URL: redis://localhost:6379/0
        run: pytest -x -q

  web-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit

  apple-native-test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Shared Swift package tests
        working-directory: shared/WaiComputerKit
        run: swift test -q

      - name: Build macOS app
        run: >
          xcodebuild
          -project macos/WaiComputer/WaiComputer.xcodeproj
          -scheme WaiComputer
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Build iOS app
        run: >
          xcodebuild
          -project ios/WaiComputer/WaiComputeriOS.xcodeproj
          -scheme WaiComputer
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build

  deploy:
    needs: [backend-test, web-test, apple-native-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: POSTGRES_PASSWORD,JWT_SECRET,ELEVENLABS_API_KEY,ELEVENLABS_CONVERSATION_AGENT_ID,ELEVENLABS_RECORDING_AGENT_ID,ANTHROPIC_API_KEY,RESEND_API_KEY,EMAIL_FROM,FRONTEND_URL,CORS_ORIGINS,SENTRY_DSN,AUTH_COOKIE_DOMAIN,CLOUDFLARE_API_TOKEN,CLOUDFLARE_ACCOUNT_ID,REDIS_URL
          script: |
            set -euo pipefail
            cd <remote-root>
            if git rev-parse --is-inside-work-tree >/dev/null 2>&1 && git remote get-url origin >/dev/null 2>&1; then
              git pull --ff-only origin main
            else
              echo "Skipping git pull (no origin remote configured)"
            fi

            # Write .env from GitHub secrets (authoritative source of truth)
            cat > backend/.env << ENVEOF
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=waicomputer
            DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/waicomputer
            JWT_SECRET=${JWT_SECRET}
            CORS_ORIGINS=${CORS_ORIGINS}
            SPEECH_TO_TEXT_PROVIDER=elevenlabs
            REALTIME_VOICE_PROVIDER=elevenlabs
            ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
            ELEVENLABS_CONVERSATION_AGENT_ID=${ELEVENLABS_CONVERSATION_AGENT_ID}
            ELEVENLABS_RECORDING_AGENT_ID=${ELEVENLABS_RECORDING_AGENT_ID}
            ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            RESEND_API_KEY=${RESEND_API_KEY}
            EMAIL_FROM=${EMAIL_FROM}
            FRONTEND_URL=${FRONTEND_URL}
            REDIS_URL=${REDIS_URL}
            CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
            CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}
            SENTRY_DSN=${SENTRY_DSN}
            AUTH_COOKIE_DOMAIN=${AUTH_COOKIE_DOMAIN}
            ENVEOF
            # Remove leading whitespace from heredoc
            sed -i 's/^[[:space:]]*//' backend/.env

            wait_for_service() {
              local name="$1"
              local command="$2"
              local attempts="$3"
              local delay="$4"
              local failure_log_command="$5"
              local attempt
              for attempt in $(seq 1 "$attempts"); do
                if eval "$command" >/dev/null 2>&1; then
                  return 0
                fi
                sleep "$delay"
              done
              echo "$name did not become healthy after $((attempts * delay)) seconds." >&2
              docker compose ps >&2 || true
              eval "$failure_log_command" >&2 || true
              exit 1
            }

            cd backend
            docker compose build api web celery-worker
            docker compose up -d api web celery-worker caddy
            wait_for_service \
              "API health check" \
              "docker compose exec -T api curl -fsS http://localhost:8000/health" \
              24 \
              5 \
              "docker logs --tail 200 waicomputer-api"
            wait_for_service \
              "Web health check" \
              "docker compose exec -T web node -e \"fetch('http://localhost:3000/').then(r => process.exit(r.status < 500 ? 0 : 1)).catch(() => process.exit(1))\"" \
              24 \
              5 \
              "docker logs --tail 200 waicomputer-web"
            wait_for_service \
              "Celery worker health check" \
              "[[ \"$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}' waicomputer-celery-worker 2>/dev/null)\" == healthy ]]" \
              24 \
              5 \
              "docker logs --tail 200 waicomputer-celery-worker"
            echo "Deploy successful (api + web + celery-worker)"
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_CONVERSATION_AGENT_ID: ${{ secrets.ELEVENLABS_CONVERSATION_AGENT_ID }}
          ELEVENLABS_RECORDING_AGENT_ID: ${{ secrets.ELEVENLABS_RECORDING_AGENT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          AUTH_COOKIE_DOMAIN: ${{ secrets.AUTH_COOKIE_DOMAIN }}
