name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "web/**"
      - "scripts/**"
      - ".github/workflows/deploy.yml"
      - ".dockerignore"

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: waicomputer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/waicomputer_test
          TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/waicomputer_test
          JWT_SECRET: test-secret-for-ci
        run: pytest -x -q

  web-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit

  deploy:
    needs: [backend-test, web-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: POSTGRES_PASSWORD,JWT_SECRET,DEEPGRAM_API_KEY,ANTHROPIC_API_KEY,S3_ENDPOINT,S3_ACCESS_KEY,S3_SECRET_KEY,S3_BUCKET,S3_REGION,RESEND_API_KEY,EMAIL_FROM,FRONTEND_URL,CORS_ORIGINS
          script: |
            set -euo pipefail
            cd /opt/waicomputer
            if git rev-parse --is-inside-work-tree >/dev/null 2>&1 && git remote get-url origin >/dev/null 2>&1; then
              git pull --ff-only origin main
            else
              echo "Skipping git pull (no origin remote configured)"
            fi

            # Write .env from GitHub secrets (authoritative source of truth)
            cat > backend/.env << ENVEOF
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=waicomputer
            DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/waicomputer
            JWT_SECRET=${JWT_SECRET}
            CORS_ORIGINS=${CORS_ORIGINS}
            DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
            ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            S3_ENDPOINT=${S3_ENDPOINT}
            S3_ACCESS_KEY=${S3_ACCESS_KEY}
            S3_SECRET_KEY=${S3_SECRET_KEY}
            S3_BUCKET=${S3_BUCKET}
            S3_REGION=${S3_REGION}
            RESEND_API_KEY=${RESEND_API_KEY}
            EMAIL_FROM=${EMAIL_FROM}
            FRONTEND_URL=${FRONTEND_URL}
            ENVEOF
            # Remove leading whitespace from heredoc
            sed -i 's/^[[:space:]]*//' backend/.env

            wait_for_service() {
              local name="$1"
              local command="$2"
              local attempts="$3"
              local delay="$4"
              local failure_log_command="$5"
              local attempt
              for attempt in $(seq 1 "$attempts"); do
                if eval "$command" >/dev/null 2>&1; then
                  return 0
                fi
                sleep "$delay"
              done
              echo "$name did not become healthy after $((attempts * delay)) seconds." >&2
              docker compose ps >&2 || true
              eval "$failure_log_command" >&2 || true
              exit 1
            }

            cd backend
            docker compose build api web
            docker compose up -d api web caddy
            wait_for_service \
              "API health check" \
              "docker compose exec -T api curl -fsS http://localhost:8000/health" \
              24 \
              5 \
              "docker logs --tail 200 waicomputer-api"
            wait_for_service \
              "Web health check" \
              "docker compose exec -T web node -e \"fetch('http://localhost:3000/login').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"" \
              24 \
              5 \
              "docker logs --tail 200 waicomputer-web"
            echo "Deploy successful (api + web)"
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
