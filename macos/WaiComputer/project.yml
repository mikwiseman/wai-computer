name: WaiComputer
options:
  bundleIdPrefix: is.waiwai
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  WaiComputerKit:
    path: ../../shared/WaiComputerKit

targets:
  WaiComputer:
    type: application
    platform: macOS
    sources:
      - path: WaiComputer
        excludes:
          - "*.entitlements"
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.waiwai.computer
        DEVELOPMENT_TEAM: R4A779QVVY
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: WaiComputer/Info.plist
        CODE_SIGN_ENTITLEMENTS: WaiComputer/WaiComputer.entitlements
        ENABLE_APP_SANDBOX: YES
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: is.waiwai.computer.dev
        Release:
          ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: WaiComputerKit
    scheme:
      testTargets:
        - WaiComputerUITests

  WaiComputerUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: WaiComputerUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.waiwai.computer.uitests
        DEVELOPMENT_TEAM: R4A779QVVY
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: WaiComputer
    dependencies:
      - target: WaiComputer
