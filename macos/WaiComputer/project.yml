name: WaiComputer
options:
  bundleIdPrefix: com.waiwai
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  WaiComputerKit:
    path: ../../shared/WaiComputerKit

targets:
  WaiComputer:
    type: application
    platform: macOS
    sources:
      - path: WaiComputer
        excludes:
          - "*.entitlements"
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.waiwai.waicomputer.macos
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: WaiComputer/Info.plist
        CODE_SIGN_ENTITLEMENTS: WaiComputer/WaiComputer.entitlements
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: WaiComputerKit
