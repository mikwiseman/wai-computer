name: WaiComputer
options:
  bundleIdPrefix: is.waiwai
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  fileTypes:
    icon:
      file: true

packages:
  WaiComputerKit:
    path: ../../shared/WaiComputerKit
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

targets:
  WaiComputer:
    type: application
    platform: macOS
    sources:
      - path: WaiComputer
        excludes:
          - "*.entitlements"
          - "*.requirements"
          - Info.plist
    settings:
      base:
        PRODUCT_NAME: WaiComputer
        PRODUCT_BUNDLE_IDENTIFIER: is.waiwai.computer
        DEVELOPMENT_TEAM: <apple-team-id>
        MARKETING_VERSION: "1.0.46"
        CURRENT_PROJECT_VERSION: "232"
        INFOPLIST_FILE: WaiComputer/Info.plist
        CODE_SIGN_ENTITLEMENTS: WaiComputer/WaiComputer.entitlements
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        # CATap (system-audio process taps) are macOS 14.2+. Weak-link CoreAudio &
        # AudioToolbox so the 14.2-only symbols bind lazily and the app launches on
        # macOS 13.0–14.1; every CATap reference is guarded by @available(macOS 14.2,*).
        OTHER_LDFLAGS: "-weak_framework CoreAudio -weak_framework AudioToolbox"
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: is.waiwai.computer.dev
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    dependencies:
      - package: WaiComputerKit
      - package: Sparkle
        product: Sparkle
    scheme:
      testTargets:
        - WaiComputerTests

  WaiComputerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: WaiComputerTests
      - path: WaiComputer/Core/AppVersionInfo.swift
      - path: WaiComputer/Core/DesignSystem.swift
      - path: WaiComputer/App/MacTestingSupport.swift
      - path: WaiComputer/App/Onboarding/OnboardingL10n.swift
      - path: WaiComputer/App/Onboarding/MacOnboardingDefaultsSnapshot.swift
      - path: WaiComputer/Features/Dictation/DictationCopy.swift
      - path: WaiComputer/Features/Dictation/DictationContextCollector.swift
      - path: WaiComputer/Features/Dictation/DictationDictionaryStore.swift
      - path: WaiComputer/Features/Dictation/DictationLanguageStore.swift
      - path: WaiComputer/Features/Dictation/DictationOverlayPanel.swift
      - path: WaiComputer/Features/Dictation/DictationStartupAudioBuffer.swift
      - path: WaiComputer/Features/Dictation/GlobalHotkeyManager.swift
      - path: WaiComputer/Features/Settings/DictationSettingsCopy.swift
      - path: WaiComputer/Features/Recording/SystemAudioWarningPolicy.swift
      - path: WaiComputer/Features/Content/MacContentFeedViewModel.swift
      - path: WaiComputer/Features/Recording/MacRecordingViewModel.swift
      - path: WaiComputer/Features/Library/MacRecordingDetailViewModel.swift
      - path: WaiComputer/Features/Updates/BetaChannelStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.waiwai.computer.tests
        DEVELOPMENT_TEAM: <apple-team-id>
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - package: Sparkle
        product: Sparkle
      - package: WaiComputerKit

  WaiComputerUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: WaiComputerUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.waiwai.computer.uitests
        DEVELOPMENT_TEAM: <apple-team-id>
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: WaiComputer
    dependencies:
      - target: WaiComputer
