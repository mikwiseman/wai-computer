name: WaiSay
options:
  bundleIdPrefix: is.waiwai
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  WaiSayKit:
    path: ../../shared/WaiSayKit

targets:
  WaiSay:
    type: application
    platform: macOS
    sources:
      - path: WaiSay
        excludes:
          - "*.entitlements"
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.waiwai.say
        DEVELOPMENT_TEAM: <apple-team-id>
        MARKETING_VERSION: "1.0.3"
        CURRENT_PROJECT_VERSION: "18"
        INFOPLIST_FILE: WaiSay/Info.plist
        CODE_SIGN_ENTITLEMENTS: WaiSay/WaiSay.entitlements
        ENABLE_APP_SANDBOX: YES
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: is.waiwai.say.dev
        Release:
          ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: WaiSayKit
    scheme:
      testTargets:
        - WaiSayUITests

  WaiSayUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: WaiSayUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.waiwai.say.uitests
        DEVELOPMENT_TEAM: <apple-team-id>
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: WaiSay
    dependencies:
      - target: WaiSay
