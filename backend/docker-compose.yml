services:
  db:
    image: pgvector/pgvector:pg16
    container_name: waicomputer-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c effective_cache_size=256MB
      -c max_connections=30
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: waicomputer-redis
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  api:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-}
        GIT_DIRTY: ${GIT_DIRTY:-false}
    container_name: waicomputer-api
    env_file:
      - ${WAICOMPUTER_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      UPLOAD_STAGING_DIR: /var/lib/waicomputer/uploads
      REDIS_URL: redis://redis:6379/0
      VOICE_IDENTIFICATION_ENABLED: "true"
      GIT_SHA: ${GIT_SHA:-}
      GIT_DIRTY: ${GIT_DIRTY:-false}
    volumes:
      - recording_uploads:/var/lib/waicomputer/uploads
      - speechbrain_cache:/root/.cache/speechbrain
    networks:
      - internal
      - web
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1200M
    command: ["sh", "-c", "alembic upgrade head && gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --workers 2 --bind 0.0.0.0:8000 --timeout 600 --keep-alive 65 --error-logfile - --capture-output"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
      args:
        # Next.js rewrites are resolved during build, so the upstream must be present here too.
        API_BASE_URL: http://api:8000
        NEXT_PUBLIC_API_BASE_URL: ""
        # NEXT_PUBLIC_* must be present at BUILD time — Next inlines them into the
        # client bundle. WEB_SENTRY_DSN lives in /etc/waicomputer/backend.env.
        NEXT_PUBLIC_SENTRY_DSN: ${WEB_SENTRY_DSN:-}
        NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${WEB_SENTRY_ENVIRONMENT:-production}
        SENTRY_RELEASE: waicomputer-web@${GIT_SHA:-local}
        SENTRY_UPLOAD_REQUIRED: ${SENTRY_UPLOAD_REQUIRED:-0}
      secrets:
        - sentry_auth_token
    container_name: waicomputer-web
    environment:
      # Next rewrites should proxy straight to the backend service inside Docker.
      API_BASE_URL: http://api:8000
      # Empty string enables relative URLs (/api/*) which Caddy proxies correctly.
      # Do NOT remove — this keeps browser requests on the canonical wai.computer host.
      NEXT_PUBLIC_API_BASE_URL: ""
      # Also surfaced at runtime so server-side Sentry init (sentry.server.config.ts)
      # picks up the same DSN.
      NEXT_PUBLIC_SENTRY_DSN: ${WEB_SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${WEB_SENTRY_ENVIRONMENT:-production}
    networks:
      - web
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/').then(r => process.exit(r.status < 500 ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: waicomputer-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../releases/macos:/srv/releases/macos:ro
      - ../releases/windows:/srv/releases/windows:ro
      - ../releases/linux:/srv/releases/linux:ro
      - ../releases/android:/srv/releases/android:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --header='Host: wai.computer' http://127.0.0.1/health >/dev/null",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-}
        GIT_DIRTY: ${GIT_DIRTY:-false}
    container_name: waicomputer-celery-worker
    env_file:
      - ${WAICOMPUTER_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      UPLOAD_STAGING_DIR: /var/lib/waicomputer/uploads
      REDIS_URL: redis://redis:6379/0
      GIT_SHA: ${GIT_SHA:-}
      GIT_DIRTY: ${GIT_DIRTY:-false}
    volumes:
      - recording_uploads:/var/lib/waicomputer/uploads
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1536M
    command: ["celery", "-A", "app.tasks.celery_app:celery_app", "worker", "--loglevel=info", "--concurrency=1", "-B"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app:celery_app inspect ping -d \"celery@$$HOSTNAME\" --timeout=5 | grep -q OK"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  recording_uploads:
  speechbrain_cache:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge

secrets:
  sentry_auth_token:
    environment: SENTRY_AUTH_TOKEN
