name: windows-release

# Triggered manually from the GitHub UI. Builds, signs (when Azure Trusted
# Signing secrets are present), and uploads a Velopack release to the
# release server. Mirrors scripts/release-windows.ps1 but runs in CI so we
# don't need a developer's Win VM during release.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer (e.g. 1.0.0)'
        required: true
        type: string
      channel:
        description: 'Release channel'
        required: true
        default: 'beta'
        type: choice
        options: [stable, beta]

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows
    permissions:
      contents: read
      id-token: write   # required for Azure Trusted Signing OIDC login

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Sync version
        shell: pwsh
        run: ./scripts/sync-version-from-csproj.ps1 -NewVersion "${{ inputs.version }}"

      - name: Restore
        run: dotnet restore

      - name: Build + test
        run: |
          dotnet build WaiComputer.sln -c Release --no-restore
          dotnet test WaiComputer.Core.Tests/WaiComputer.Core.Tests.csproj -c Release --no-build
          dotnet test WaiComputer.Native.Tests/WaiComputer.Native.Tests.csproj -c Release --no-build

      - name: Publish
        run: |
          dotnet publish WaiComputer/WaiComputer.csproj -c Release -r win-x64 `
            --self-contained=false `
            -p:WindowsAppSDKSelfContained=true `
            -o publish/win-x64

      - name: Generate release notes
        shell: pwsh
        run: |
          $prev = git describe --tags --abbrev=0 --match "windows-*" 2>$null
          if (-not $prev) { $prev = "HEAD~50" }
          git log --pretty="%s" "$prev..HEAD" `
            | Where-Object { $_ -notmatch '^(chore|docs|test|refactor|wip):' } `
            | ForEach-Object { "- $_" } `
            | Out-File -FilePath release-notes.md -Encoding utf8

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Azure login (Trusted Signing)
        if: ${{ secrets.AZURE_TENANT_ID != '' }}
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Pack (signed when secrets present)
        shell: pwsh
        env:
          TS_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          TS_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          TS_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
        run: |
          $args = @(
            "pack",
            "--packId", "is.waiwai.computer",
            "--packVersion", "${{ inputs.version }}",
            "--packDir", "publish/win-x64",
            "--mainExe", "WaiComputer.exe",
            "--channel", "${{ inputs.channel }}",
            "--releaseNotes", "release-notes.md"
          )
          if ($env:TS_ENDPOINT) {
            $args += @(
              "--azureTrustedSigningEndpoint", $env:TS_ENDPOINT,
              "--azureTrustedSigningAccount", $env:TS_ACCOUNT,
              "--azureTrustedSigningCertificateProfile", $env:TS_PROFILE
            )
            Write-Host "▶ Signing with Azure Trusted Signing" -ForegroundColor Green
          } else {
            Write-Host "▶ AZURE_TRUSTED_SIGNING_* secrets not configured — packing UNSIGNED" -ForegroundColor Yellow
          }
          vpk @args

      - name: Verify signature
        shell: pwsh
        if: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT != '' }}
        run: |
          $setup = Get-ChildItem Releases\*-Setup.exe | Select-Object -First 1
          if (-not $setup) { throw "No Setup.exe produced" }
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" verify /pa $setup.FullName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaiComputer-${{ inputs.version }}-${{ inputs.channel }}
          path: windows/Releases

      - name: Upload to VPS
        if: ${{ secrets.VPS_SSH_PRIVATE_KEY != '' }}
        shell: bash
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_REMOTE_ROOT: ${{ secrets.WINDOWS_RELEASE_REMOTE_ROOT }}
        run: |
          test -n "$SSH_HOST"
          test -n "$SSH_USER"
          test -n "$SSH_REMOTE_ROOT"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519 && chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 "$SSH_USER@$SSH_HOST" "mkdir -p '$SSH_REMOTE_ROOT'"
          scp -i ~/.ssh/id_ed25519 -r windows/Releases/* "$SSH_USER@$SSH_HOST:$SSH_REMOTE_ROOT/"

      - name: Tag
        if: ${{ success() && secrets.AZURE_TRUSTED_SIGNING_ENDPOINT != '' }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git tag "windows-${{ inputs.version }}-${{ inputs.channel }}"
          git push origin "windows-${{ inputs.version }}-${{ inputs.channel }}"
