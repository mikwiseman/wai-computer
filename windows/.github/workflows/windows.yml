name: windows

on:
  push:
    branches: [main]
    paths:
      - 'windows/**'
      - 'shared/**'
      - '.github/workflows/windows.yml'
  pull_request:
    paths:
      - 'windows/**'

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build WaiComputer.sln -c Release --no-restore

      - name: Test (portable + native)
        run: |
          dotnet test WaiComputer.Core.Tests/WaiComputer.Core.Tests.csproj -c Release --no-build --collect:"XPlat Code Coverage"
          dotnet test WaiComputer.Native.Tests/WaiComputer.Native.Tests.csproj -c Release --no-build --collect:"XPlat Code Coverage"

      - name: Coverage report
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator -reports:"**\coverage.cobertura.xml" -targetdir:coverage -reporttypes:Html
          echo "Coverage report ready."

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-windows
          path: windows/coverage

      - name: Velopack smoke pack (unsigned)
        run: |
          dotnet publish WaiComputer/WaiComputer.csproj -c Release -r win-x64 --self-contained=false -p:WindowsAppSDKSelfContained=true -o publish/win-x64
          dotnet tool install -g vpk
          vpk pack --packId is.waiwai.computer --packVersion 0.0.0-ci --packDir publish/win-x64 --mainExe WaiComputer.exe --channel stable

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaiComputer-ci-build
          path: windows/Releases
