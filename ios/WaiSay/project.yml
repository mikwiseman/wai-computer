name: WaiSayiOS
options:
  bundleIdPrefix: is.waiwai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  WaiSayKit:
    path: ../../shared/WaiSayKit

targets:
  WaiSay:
    type: application
    platform: iOS
    sources:
      - path: WaiSay
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.waiwai.say
        DEVELOPMENT_TEAM: R4A779QVVY
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: "9"
        INFOPLIST_FILE: WaiSay/Info.plist
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: is.waiwai.say.dev
    dependencies:
      - package: WaiSayKit
