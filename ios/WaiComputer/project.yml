name: WaiComputeriOS
options:
  bundleIdPrefix: is.waiwai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  fileTypes:
    icon:
      file: true

packages:
  WaiComputerKit:
    path: ../../shared/WaiComputerKit

targets:
  WaiComputer:
    type: application
    platform: iOS
    sources:
      - path: WaiComputer
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.waiwai.computer
        DEVELOPMENT_TEAM: <apple-team-id>
        MARKETING_VERSION: "1.4.3"
        CURRENT_PROJECT_VERSION: "49"
        INFOPLIST_FILE: WaiComputer/Info.plist
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: is.waiwai.computer.dev
    dependencies:
      - package: WaiComputerKit
    scheme:
      testTargets:
        - WaiComputerTests

  WaiComputerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WaiComputerTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.waiwai.computer.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    dependencies:
      - target: WaiComputer
